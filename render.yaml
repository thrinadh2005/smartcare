services:
  - type: web
    name: smartcare-app
    env: node
    buildCommand: npm run build && cd backend && npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 5050
      - key: NODE_ENV
        value: production
      - key: REACT_APP_API_URL
        value: /api
