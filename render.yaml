services:
  # Backend service
  - type: web
    name: smartcare-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false # Set this in Render dashboard
      - key: JWT_SECRET
        sync: false # Set this in Render dashboard
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # Frontend service
  - type: web
    name: smartcare-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://smartcare-backend.onrender.com/api # Update this after backend deployment
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
